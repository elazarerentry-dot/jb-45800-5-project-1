<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Manager – Filter</title>
    <script defer src="app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🔍 Filter Expenses</h1>
    <nav id="navBar"></nav>

    <form onsubmit="filterFormFunc(event)">
        <span class="filter-label">Filter by Date</span>
        <div class="filter-row">
            <select id="year"></select>
            <select id="month"></select>
            <select id="day"></select>
        </div>
        <span class="filter-label">Filter by Amount</span>
        <div class="filter-row">
            <input type="number" id="min" placeholder="Min ($)" min="0">
            <input type="number" id="max" placeholder="Max ($)" min="0">
        </div>
        <button type="submit">🔍 Filter</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Category</th>
                <th>Description</th>
                <th>Cost ($)</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

</body>
</html>
